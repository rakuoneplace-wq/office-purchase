<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 【修改】更改網站標題 -->
    <title>一方生活同事採購網 | 企業內部採購系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #ef4444; /* 用於「新品」標籤 */
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 頂部導覽列 */
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* 【修改】更改 Logo 名稱 */
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* 主容器佈局 */
        .main-container {
            display: grid;
            grid-template-columns: 240px 1fr; /* 左側固定寬度 */
            gap: 30px;
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* 左側分類選單 */
        aside {
            background: var(--sidebar-bg);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border);
            position: sticky;
            top: 100px;
        }

        .category-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--secondary); }
        .category-list { list-style: none; padding: 0; margin: 0; }
        .category-item { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: all 0.2s; color: var(--text-muted); font-size: 0.95rem; }
        .category-item:hover { color: var(--primary); background: #f0f7ff; border-radius: 6px; }
        .category-item.active { color: var(--primary); font-weight: 700; background: #f0f7ff; border-radius: 6px; }

        /* 右側主要內容區 */
        main { display: flex; flex-direction: column; gap: 30px; }

        /* Banner 橫幅 */
        .hero-banner {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .hero-banner img { width: 100%; display: block; object-fit: cover; height: 250px; }

        /* 商品區塊標題 */
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; display: flex; align-items: center; justify-content: space-between; }

        /* 商品格網 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* 商品卡片 */
        .product-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .badge-new {
            position: absolute; top: 10px; right: 10px; background: var(--secondary); color: #fff; 
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; z-index: 10;
        }

        .img-box { width: 100%; height: 180px; background: #f8fafc; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .info-box { padding: 15px; }
        .item-id { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .item-name { font-weight: 500; font-size: 0.95rem; height: 2.8rem; overflow: hidden; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .item-price { color: var(--secondary); font-weight: 700; font-size: 1.1rem; }

        .add-btn {
            width: 100%; padding: 10px; background: var(--primary); color: #fff; border: none; 
            border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: 500; transition: background 0.2s;
        }
        .add-btn:hover { background: var(--primary-hover); }

        /* 底部表單區塊 */
        .form-section-container { margin-top: 50px; scroll-margin-top: 100px; padding-bottom: 100px;}
        .ecommerce-card { background: #fff; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); display: flex; overflow: hidden; border: 1px solid var(--border); }
        .product-showcase { flex: 1; background: #f8fafc; padding: 40px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border); }
        .form-section { flex: 1.2; padding: 40px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box;}
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; }

        /* 選單 Optgroup 樣式微調 */
        select optgroup { font-weight: 700; color: var(--primary); }
        select option { color: var(--text-main); font-weight: 400; }

        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } aside { display: none; } .ecommerce-card { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-cart-shopping"></i> 一方生活同事採購網</div>
        <div class="user-info"><i class="fa-solid fa-circle-user"></i> 您好，同仁</div>
    </header>

    <div class="main-container">
        
        <!-- 左側分類選單：加上了 onClick 動態過濾功能 -->
        <aside>
            <div class="category-title"><i class="fa-solid fa-bars"></i> 產品分類</div>
            <ul class="category-list" id="category-list">
                <li class="category-item active" onclick="filterCategory('全部商品')">全部商品</li>
                <li class="category-item" onclick="filterCategory('辦公文具')">辦公文具</li>
                <li class="category-item" onclick="filterCategory('影印紙張')">影印紙張</li>
                <li class="category-item" onclick="filterCategory('檔案收納')">檔案收納</li>
                <li class="category-item" onclick="filterCategory('電腦週邊')">電腦週邊</li>
                <li class="category-item" onclick="filterCategory('生活用品')">生活用品</li>
                <li class="category-item" onclick="filterCategory('茶水間備品')">茶水間備品</li>
                <li class="category-item" onclick="filterCategory('家具桌椅')">家具桌椅</li>
            </ul>
        </aside>

        <main>
            <div class="hero-banner">
                <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1200&q=80" alt="Banner">
            </div>

            <!-- 動態改變標題 -->
            <div class="section-title" id="current-category-title">全部商品</div>
            
            <!-- 商品動態生成的容器 -->
            <div class="product-grid" id="product-grid-container">
                <!-- 商品卡片會由下方 JavaScript 自動渲染到這裡 -->
            </div>

            <div id="apply-form-anchor" class="form-section-container">
                <div class="section-title">填寫採購申請</div>
                <div class="ecommerce-card">
                    <div class="product-showcase">
                        <div style="width: 250px; height: 250px; background: #fff; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #e2e8f0;">
                            <img id="form-display-image" src="https://images.unsplash.com/photo-1583484963886-92f586954211?auto=format&fit=crop&w=400&q=80" style="width: 100%; object-fit: contain;">
                        </div>
                        <div id="form-display-title" style="font-weight: 700; font-size: 1.2rem;">請在上方點選商品</div>
                        <div id="form-display-price" style="color: var(--primary); font-size: 1.5rem; font-weight: 700; margin-top: 10px;">NT$ 0</div>
                    </div>

                    <div class="form-section">
                        <form id="purchase-form">
                            <div class="input-group">
                                <label>申請人姓名</label>
                                <input type="text" id="applicantName" placeholder="王小明" required>
                            </div>
                            <div class="input-group">
                                <label>部門</label>
                                <select id="department" required>
                                    <option value="" disabled selected>請選擇部門</option>
                                    <option value="行銷部">行銷部</option>
                                    <option value="資訊部">資訊部</option>
                                    <option value="總務部">總務部</option>
                                    <option value="人資部">人資部</option>
                                    <option value="業務部">業務部</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>物品名稱</label>
                                <select id="itemSelect" required onchange="onManualSelect()">
                                    <!-- 選項會由 JavaScript 根據分類自動生成 optgroup -->
                                </select>
                            </div>
                            <div class="input-group">
                                <label>申請數量</label>
                                <input type="number" id="itemQuantity" min="1" value="1" required oninput="calculateTotal()">
                            </div>
                            <div class="input-group">
                                <label>總金額 (自動計算)</label>
                                <input type="text" id="itemPrice" readonly>
                            </div>
                            <button type="submit" class="submit-btn" id="submit-btn">送出採購申請</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // 【新增】超豐富的商品資料庫（包含各個分類）
        // 之後你可以隨時在這裡修改或新增商品
        // ==========================================
        const products = [
            // 辦公文具
            { id: "S001", category: "辦公文具", name: "紅龍牌 原子筆 (黑/一盒50入)", price: 150, isNew: true, image: "https://images.unsplash.com/photo-1585336261022-680e295ce3fe?auto=format&fit=crop&w=400&q=80" },
            { id: "S002", category: "辦公文具", name: "3M 狠黏便利貼 (黃/5本入)", price: 250, isNew: false, image: "https://images.unsplash.com/photo-1531346878377-3e110439f046?auto=format&fit=crop&w=400&q=80" },
            { id: "S003", category: "辦公文具", name: "PLUS 智慧型滾輪修正帶 (藍)", price: 120, isNew: false, image: "https://images.unsplash.com/photo-1520004434532-668416a08753?auto=format&fit=crop&w=400&q=80" },
            
            // 影印紙張
            { id: "P001", category: "影印紙張", name: "Double A 影印紙 (A4/一箱5包)", price: 650, isNew: true, image: "https://images.unsplash.com/photo-1586075010923-2dd4570fb338?auto=format&fit=crop&w=400&q=80" },
            { id: "P002", category: "影印紙張", name: "Paperline 影印紙 (A3/一箱5包)", price: 1200, isNew: false, image: "https://images.unsplash.com/photo-1586075010923-2dd4570fb338?auto=format&fit=crop&w=400&q=80" }, /* 圖片共用示意 */
            
            // 檔案收納
            { id: "F001", category: "檔案收納", name: "透明 L型資料夾 (100入)", price: 300, isNew: false, image: "https://images.unsplash.com/photo-1616628188550-808682f3926d?auto=format&fit=crop&w=400&q=80" },
            { id: "F002", category: "檔案收納", name: "二孔環保檔案夾 (藍/10入)", price: 450, isNew: false, image: "https://images.unsplash.com/photo-1616628188550-808682f3926d?auto=format&fit=crop&w=400&q=80" }, /* 圖片共用示意 */

            // 電腦週邊
            { id: "C001", category: "電腦週邊", name: "羅技 M331 靜音無線滑鼠 (黑)", price: 549, isNew: false, image: "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?auto=format&fit=crop&w=400&q=80" },
            { id: "C002", category: "電腦週邊", name: "羅技 K380 跨平台藍牙鍵盤", price: 990, isNew: true, image: "https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=400&q=80" },
            
            // 生活用品
            { id: "L001", category: "生活用品", name: "舒潔 抽取式衛生紙 (1箱72包)", price: 899, isNew: false, image: "https://images.unsplash.com/photo-1584556812952-905ffd0c611a?auto=format&fit=crop&w=400&q=80" },
            { id: "L002", category: "生活用品", name: "五月花 輕柔擦手紙 (1箱20包)", price: 650, isNew: false, image: "https://images.unsplash.com/photo-1584556812952-905ffd0c611a?auto=format&fit=crop&w=400&q=80" }, /* 圖片共用示意 */

            // 茶水間備品
            { id: "T001", category: "茶水間備品", name: "UCC 職人經典濾掛式咖啡 (50入)", price: 750, isNew: true, image: "https://images.unsplash.com/photo-1559525839-b184a4d698c7?auto=format&fit=crop&w=400&q=80" },
            { id: "T002", category: "茶水間備品", name: "天仁茗茶 醇品紅茶包 (100入)", price: 350, isNew: false, image: "https://images.unsplash.com/photo-1559525839-b184a4d698c7?auto=format&fit=crop&w=400&q=80" }, /* 圖片共用示意 */

            // 家具桌椅
            { id: "D001", category: "家具桌椅", name: "人體工學椅 - 經典旗艦款", price: 3200, isNew: false, image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&w=400&q=80" },
            { id: "D002", category: "家具桌椅", name: "辦公室升降桌 (120cm/白色)", price: 6500, isNew: false, image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=400&q=80" }
        ];

        // ==========================================
        // 初始化與動態渲染功能
        // ==========================================
        window.onload = function() {
            initSelectOptions();
            filterCategory('全部商品'); // 預設顯示全部商品
        };

        // 動態生成下拉選單 (依賴分類群組 optgroup)
        function initSelectOptions() {
            const select = document.getElementById('itemSelect');
            select.innerHTML = '<option value="" disabled selected>請選擇物品</option>';
            
            // 取出所有不重複的分類
            const categories = [...new Set(products.map(p => p.category))];
            
            categories.forEach(cat => {
                const optgroup = document.createElement('optgroup');
                optgroup.label = `--- ${cat} ---`;
                
                products.filter(p => p.category === cat).forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    optgroup.appendChild(opt);
                });
                select.appendChild(optgroup);
            });
        }

        // 點擊左邊選單，過濾並重新渲染商品
        function filterCategory(categoryName) {
            // 更新左邊選單的 Active (反白) 狀態
            const items = document.querySelectorAll('.category-item');
            items.forEach(item => {
                item.classList.remove('active');
                if (item.textContent === categoryName) {
                    item.classList.add('active');
                }
            });

            // 更新標題
            document.getElementById('current-category-title').textContent = categoryName;

            // 過濾資料
            let filteredProducts = products;
            if (categoryName !== '全部商品') {
                filteredProducts = products.filter(p => p.category === categoryName);
            }

            // 將過濾後的資料渲染到畫面上
            const container = document.getElementById('product-grid-container');
            container.innerHTML = ''; // 先清空目前的商品

            filteredProducts.forEach(p => {
                const newBadge = p.isNew ? `<div class="badge-new">新品</div>` : '';
                const cardHTML = `
                    <div class="product-card">
                        ${newBadge}
                        <div class="img-box">
                            <img src="${p.image}" alt="${p.name}">
                        </div>
                        <div class="info-box">
                            <div class="item-id">#${p.id}</div>
                            <div class="item-name">${p.name}</div>
                            <div class="item-price">NT$ ${p.price.toLocaleString()}</div>
                            <button class="add-btn" onclick="quickApply('${p.id}')">加入申請</button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 點擊卡片「加入申請」快速填單
        function quickApply(id) {
            document.getElementById('itemSelect').value = id;
            updateFormUI(id);
            document.getElementById('apply-form-anchor').scrollIntoView({ behavior: 'smooth' });
        }

        // 手動選擇下拉選單
        function onManualSelect() {
            const id = document.getElementById('itemSelect').value;
            updateFormUI(id);
        }

        // 更新表單顯示資訊
        function updateFormUI(id) {
            const p = products.find(i => i.id === id);
            if(p) {
                document.getElementById('form-display-image').src = p.image;
                document.getElementById('form-display-title').textContent = p.name;
                calculateTotal();
            }
        }

        // 計算總額
        function calculateTotal() {
            const id = document.getElementById('itemSelect').value;
            const qty = document.getElementById('itemQuantity').value || 1;
            const p = products.find(i => i.id === id);
            if(p) {
                const total = p.price * qty;
                document.getElementById('form-display-price').textContent = `NT$ ${total.toLocaleString()}`;
                document.getElementById('itemPrice').value = `NT$ ${total.toLocaleString()}`;
            }
        }

        // 產生獨立的訂單編號
        function generateOrderId() {
            const date = new Date();
            const dateString = date.getFullYear() + 
                               String(date.getMonth() + 1).padStart(2, '0') + 
                               String(date.getDate()).padStart(2, '0');
            const randomCode = Math.floor(1000 + Math.random() * 9000);
            return `PO-${dateString}-${randomCode}`;
        }

        // ==========================================
        // 【保留】這裡依然使用你專屬的 API 網址
        // ==========================================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz0mIvcADAvPHaPnQvchyKOu9P6EMaere-At9hFYBpMaRwGQ53piNKLFoHAN9NIOQ4/exec';
        
        document.getElementById('purchase-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.textContent = '處理中...';
            btn.disabled = true;

            const orderId = generateOrderId();

            const formData = new FormData();
            formData.append('orderId', orderId);
            formData.append('applicantName', document.getElementById('applicantName').value);
            formData.append('department', document.getElementById('department').value);
            // 抓取被選中物品的文字名稱
            formData.append('itemName', document.getElementById('itemSelect').options[document.getElementById('itemSelect').selectedIndex].text);
            formData.append('itemQuantity', document.getElementById('itemQuantity').value);
            formData.append('itemPrice', document.getElementById('itemPrice').value);

            // 送出資料
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                alert('🎉 申請成功！單號：' + orderId);
                location.reload(); // 送出成功後重整網頁
            })
            .catch(err => alert('出錯了：' + err));
        });
    </script>
</body>
</html>
